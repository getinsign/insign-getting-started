<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" width="90" height="90">
  <defs>
    <radialGradient id="si" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#E65100"/>
    </radialGradient>
  </defs>
  <rect width="30" height="30" rx="6" fill="#1A1A2E"/>
  <circle cx="15" cy="14" r="6.5" fill="url(#si)"/>
  <!-- Warm rays (orange) -->
  <g stroke="#FFB74D" stroke-width="1.8" stroke-linecap="round" opacity="0.8">
    <line x1="15" y1="4" x2="15" y2="5.5"/>
    <line x1="15" y1="22.5" x2="15" y2="24"/>
    <line x1="7.9" y1="6.9" x2="9" y2="8"/>
    <line x1="21" y1="20" x2="22.1" y2="21.1"/>
  </g>
  <!-- Cool rays (teal) -->
  <g stroke="#00BCD4" stroke-width="1.8" stroke-linecap="round" opacity="0.8">
    <line x1="5" y1="14" x2="6.5" y2="14"/>
    <line x1="23.5" y1="14" x2="25" y2="14"/>
    <line x1="7.9" y1="21.1" x2="9" y2="20"/>
    <line x1="21" y1="8" x2="22.1" y2="6.9"/>
  </g>
  <!-- Teal energy arc -->
  <path d="M8 26 Q15 22 22 26" fill="none" stroke="#00BCD4" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <rect x="6" y="27" width="18" height="2" rx="1" fill="#FF9800" opacity="0.5"/>
</svg>
