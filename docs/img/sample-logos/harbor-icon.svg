<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" width="90" height="90">
  <defs>
    <linearGradient id="hiBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#880E4F"/>
      <stop offset="100%" stop-color="#4A0028"/>
    </linearGradient>
    <linearGradient id="hiAnc" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#EC407A"/>
    </linearGradient>
    <linearGradient id="hiAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F48FB1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F48FB1" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="hiSh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.8" flood-color="#2A0016" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="30" height="30" rx="6" fill="url(#hiBg)"/>
  <g filter="url(#hiSh)">
    <!-- Anchor ring at top -->
    <circle cx="15" cy="7.5" r="2.2" fill="none" stroke="url(#hiAnc)" stroke-width="1.2"/>
    <!-- Anchor shaft -->
    <line x1="15" y1="9.7" x2="15" y2="22" stroke="url(#hiAnc)" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Cross bar -->
    <line x1="10.5" y1="13" x2="19.5" y2="13" stroke="url(#hiAnc)" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Flukes -->
    <path d="M8 19 C8 22 11 24 15 22" fill="none" stroke="url(#hiAnc)" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M22 19 C22 22 19 24 15 22" fill="none" stroke="url(#hiAnc)" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Fluke tips -->
    <path d="M7 18.5 L8 19 L8 20.5" fill="none" stroke="#F48FB1" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M23 18.5 L22 19 L22 20.5" fill="none" stroke="#F48FB1" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <rect x="0" y="26" width="30" height="4" fill="url(#hiAccent)" clip-path="inset(0 0 0 0 round 0 0 6 6)"/>
</svg>
