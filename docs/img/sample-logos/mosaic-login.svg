  <rect x="16" y="55" width="18" height="18" rx="4" fill="#43A047"/>
  <rect x="38" y="55" width="28" height="18" rx="4" fill="#42A5F5"/>
  <rect x="70" y="62" width="14" height="18" rx="3" fill="#1976D2"/>
  <rect x="16" y="77" width="14" height="14" rx="3" fill="#FFB300"/>
