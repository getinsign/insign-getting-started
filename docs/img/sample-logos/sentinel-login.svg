<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 12 372 105" width="1116" height="315">
  <defs>
    <linearGradient id="slBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#0D1457"/>
    </linearGradient>
    <linearGradient id="slShield" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <linearGradient id="slLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD600" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD600" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="slGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFD600" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD600" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Icon block -->
  <rect x="0" y="15" width="100" height="100" rx="18" fill="url(#slBg)"/>
  <circle cx="50" cy="65" r="48" fill="url(#slGlow)"/>
  <!-- Shield -->
  <path d="M50 26 L76 36 L76 60 C76 72 65 82 50 88 C35 82 24 72 24 60 L24 36 Z" fill="url(#slShield)" opacity="0.15"/>
  <path d="M50 30 L73 39 L73 60 C73 70.5 63.5 79 50 84.5 C36.5 79 27 70.5 27 60 L27 39 Z" fill="none" stroke="url(#slShield)" stroke-width="2"/>
  <path d="M50 34 L70 42 L70 60 C70 69 62 76.5 50 81.5 C38 76.5 30 69 30 60 L30 42 Z" fill="url(#slShield)" opacity="0.2"/>
  <!-- Checkmark -->
  <path d="M38 59 L46 67.5 L62 50" fill="none" stroke="#FFD600" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="100" width="100" height="15" fill="url(#slShield)" opacity="0.25" clip-path="inset(0 0 0 0 round 0 0 18 18)"/>
  <!-- Company name -->
  <text x="120" y="52" font-family="'Segoe UI',system-ui,sans-serif" font-size="48" font-weight="700" fill="#1A237E">Sentinel</text>
  <!-- Subtitle -->
  <text x="120" y="78" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" font-weight="300" fill="#1A237E" letter-spacing="4" opacity="0.7">INSURANCE</text>
  <!-- Separator line -->
  <line x1="120" y1="90" x2="370" y2="90" stroke="url(#slLine)" stroke-width="1.5"/>
  <!-- Tagline -->
  <text x="120" y="108" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="400" fill="#1A237E" opacity="0.5">Protection You Can Trust Since 1952</text>
