<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 8 406 109" width="1218" height="327">
  <defs>
    <linearGradient id="alBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
    <linearGradient id="alUmb" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#4DB6AC"/>
    </linearGradient>
    <linearGradient id="alLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#80CBC4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#80CBC4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="alGlow" cx="0.5" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#80CBC4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#80CBC4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Icon block -->
  <rect x="0" y="15" width="100" height="100" rx="18" fill="url(#alBg)"/>
  <circle cx="50" cy="50" r="40" fill="url(#alGlow)"/>
  <!-- Umbrella dome -->
  <path d="M20 70 C20 45 32 28 50 28 C68 28 80 45 80 70 Z" fill="url(#alUmb)" opacity="0.18"/>
  <path d="M23 70 C23 47 34 31 50 31 C66 31 77 47 77 70" fill="none" stroke="url(#alUmb)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ribs -->
  <path d="M50 31 L50 70" stroke="#80CBC4" stroke-width="1" opacity="0.4"/>
  <path d="M38 38 L33 70" stroke="#80CBC4" stroke-width="0.7" opacity="0.3"/>
  <path d="M62 38 L67 70" stroke="#80CBC4" stroke-width="0.7" opacity="0.3"/>
  <!-- Handle -->
  <line x1="50" y1="70" x2="50" y2="94" stroke="#80CBC4" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M50 94 C50 98 46 101 43 98" fill="none" stroke="#80CBC4" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Bottom accent -->
  <rect x="0" y="100" width="100" height="15" fill="url(#alUmb)" opacity="0.2" clip-path="inset(0 0 0 0 round 0 0 18 18)"/>
  <!-- Company name -->
  <text x="120" y="52" font-family="'Segoe UI',system-ui,sans-serif" font-size="48" font-weight="700" fill="#00695C">Aegis Life</text>
  <!-- Subtitle -->
  <text x="120" y="78" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="300" fill="#00695C" letter-spacing="6" opacity="0.6">LIFE &amp; HEALTH</text>
  <!-- Separator line -->
  <line x1="120" y1="90" x2="370" y2="90" stroke="url(#alLine)" stroke-width="1.5"/>
  <!-- Tagline -->
  <text x="120" y="108" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" font-weight="400" fill="#00695C" opacity="0.5">Life · Health · Disability · Long-Term Care</text>
</svg>