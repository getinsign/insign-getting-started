<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" width="90" height="90">
  <defs>
    <linearGradient id="nxg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#0F2440"/>
    </linearGradient>
    <radialGradient id="nxg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9963A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#C9963A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="30" height="30" rx="6" fill="url(#nxg-bg)"/>
  <!-- Network nodes -->
  <circle cx="15" cy="8" r="3.5" fill="#C9963A" fill-opacity="0.85"/>
  <circle cx="7.5" cy="19" r="3.5" fill="#C75B4A" fill-opacity="0.85"/>
  <circle cx="22.5" cy="19" r="3.5" fill="#C9963A" fill-opacity="0.85"/>
  <!-- Connecting lines -->
  <line x1="15" y1="8" x2="7.5" y2="19" stroke="#C9963A" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="15" y1="8" x2="22.5" y2="19" stroke="#C9963A" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="7.5" y1="19" x2="22.5" y2="19" stroke="#C75B4A" stroke-width="1.2" stroke-opacity="0.5"/>
  <!-- Central glow -->
  <circle cx="15" cy="15" r="6" fill="url(#nxg-glow)"/>
  <!-- Node highlights -->
  <circle cx="15" cy="8" r="1.5" fill="#fff" fill-opacity="0.35"/>
  <circle cx="7.5" cy="19" r="1.5" fill="#fff" fill-opacity="0.25"/>
  <circle cx="22.5" cy="19" r="1.5" fill="#fff" fill-opacity="0.35"/>
  <!-- Accent bar -->
  <rect x="5" y="25" width="20" height="2" rx="1" fill="#C9963A" opacity="0.4"/>
</svg>
