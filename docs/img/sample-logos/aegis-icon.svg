<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" width="90" height="90">
  <defs>
    <linearGradient id="aiBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#004D40"/>
    </linearGradient>
    <linearGradient id="aiUmb" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#80CBC4"/>
      <stop offset="100%" stop-color="#4DB6AC"/>
    </linearGradient>
    <linearGradient id="aiAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#80CBC4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#80CBC4" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="aiGlow" cx="0.5" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#80CBC4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#80CBC4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="30" height="30" rx="6" fill="url(#aiBg)"/>
  <circle cx="15" cy="12" r="10" fill="url(#aiGlow)"/>
  <!-- Umbrella dome -->
  <path d="M6 16 C6 9.5 10 5.5 15 5.5 C20 5.5 24 9.5 24 16 Z" fill="url(#aiUmb)" opacity="0.25"/>
  <path d="M7 16 C7 10.2 10.5 6.5 15 6.5 C19.5 6.5 23 10.2 23 16" fill="none" stroke="url(#aiUmb)" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Dome ribs -->
  <path d="M15 6.5 L15 16" stroke="#80CBC4" stroke-width="0.6" opacity="0.5"/>
  <path d="M11 8.5 L10 16" stroke="#80CBC4" stroke-width="0.4" opacity="0.3"/>
  <path d="M19 8.5 L20 16" stroke="#80CBC4" stroke-width="0.4" opacity="0.3"/>
  <!-- Handle (pole + hook) -->
  <line x1="15" y1="16" x2="15" y2="23" stroke="#80CBC4" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M15 23 C15 24.5 13.5 25.5 12.5 24.5" fill="none" stroke="#80CBC4" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Accent bar -->
  <rect x="0" y="26" width="30" height="4" fill="url(#aiAccent)" clip-path="inset(0 0 0 0 round 0 0 6 6)"/>
</svg>