<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 13 489 104" width="1467" height="312">
  <defs>
    <linearGradient id="prl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <linearGradient id="prl-prism" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#B0BEC5" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="prl-sep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF1744"/>
      <stop offset="25%" stop-color="#FF9100"/>
      <stop offset="50%" stop-color="#00E676"/>
      <stop offset="75%" stop-color="#2979FF"/>
      <stop offset="100%" stop-color="#D500F9"/>
    </linearGradient>
  </defs>
  <!-- Icon area background -->
  <rect x="8" y="15" width="100" height="100" rx="16" fill="url(#prl-bg)"/>
  <!-- Incoming beam -->
  <polygon points="22,62 38,59 38,67 22,65" fill="#ffffff" fill-opacity="0.8"/>
  <!-- Prism -->
  <polygon points="58,24 38,100 78,100" fill="url(#prl-prism)" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.4"/>
  <!-- Rainbow beams -->
  <polygon points="78,42 100,28 100,34" fill="#FF1744" fill-opacity="0.9"/>
  <polygon points="78,49 100,37 100,43" fill="#FF9100" fill-opacity="0.9"/>
  <polygon points="78,56 100,46 100,52" fill="#FFD600" fill-opacity="0.9"/>
  <polygon points="78,63 100,55 100,61" fill="#00E676" fill-opacity="0.9"/>
  <polygon points="78,70 100,64 100,70" fill="#2979FF" fill-opacity="0.9"/>
  <polygon points="78,77 100,73 100,79" fill="#D500F9" fill-opacity="0.9"/>
  <!-- Company name large with multicolor -->
  <text x="130" y="52" font-family="'Segoe UI',system-ui,sans-serif" font-size="36" font-weight="700" letter-spacing="1.5">
    <tspan fill="#FF1744">P</tspan><tspan fill="#FF9100">r</tspan><tspan fill="#FFD600">i</tspan><tspan fill="#00E676">s</tspan><tspan fill="#2979FF">m</tspan>
    <tspan fill="#D500F9" dx="8">D</tspan><tspan fill="#FF1744">i</tspan><tspan fill="#FF9100">g</tspan><tspan fill="#00E676">i</tspan><tspan fill="#2979FF">t</tspan><tspan fill="#D500F9">a</tspan><tspan fill="#FFD600">l</tspan>
  </text>
  <!-- Subtitle -->
  <text x="130" y="72" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#B0BEC5" letter-spacing="3" font-weight="300">
    SPECTRUM OF IDEAS
  </text>
  <!-- Rainbow separator -->
  <rect x="130" y="82" width="220" height="2.5" rx="1.25" fill="url(#prl-sep)"/>
  <!-- Tagline -->
  <text x="130" y="102" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#78909C" letter-spacing="0.5">
    Creative Agency · Digital Media · Brand Strategy
  </text>
</svg>