  <path d="M30 42 C30 28 38 18 50 18 C62 18 70 28 70 42 Z" fill="url(#amUmb)" opacity="0.2"/>
  <path d="M32 42 C32 29.5 39 20 50 20 C61 20 68 29.5 68 42" fill="none" stroke="url(#amUmb)" stroke-width="2" stroke-linecap="round"/>
