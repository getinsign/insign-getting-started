  <path d="M50 20 L50 42" stroke="#80CBC4" stroke-width="0.8" opacity="0.4"/>
  <path d="M41 24 L38 42" stroke="#80CBC4" stroke-width="0.5" opacity="0.3"/>
  <path d="M59 24 L62 42" stroke="#80CBC4" stroke-width="0.5" opacity="0.3"/>
