<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 130">
  <defs>
    <linearGradient id="ae-bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#004D40"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="ae-wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#80CBC4" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#80CBC4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#80CBC4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="595" height="130" fill="url(#ae-bg)"/>
  <!-- Soft wave/arc shapes -->
  <path d="M0,90 Q150,50 300,80 Q450,110 595,70 L595,130 L0,130 Z" fill="#80CBC4" opacity="0.05"/>
  <path d="M0,100 Q200,70 400,95 Q500,105 595,85 L595,130 L0,130 Z" fill="#80CBC4" opacity="0.04"/>
  <path d="M0,115 Q100,100 250,110 Q400,120 595,105 L595,130 L0,130 Z" fill="#80CBC4" opacity="0.06"/>
  <!-- Rounded arc decorative elements -->
  <circle cx="500" cy="65" r="40" fill="none" stroke="#80CBC4" stroke-width="0.8" opacity="0.08"/>
  <circle cx="520" cy="55" r="25" fill="none" stroke="#80CBC4" stroke-width="0.6" opacity="0.06"/>
  <circle cx="540" cy="75" r="15" fill="none" stroke="#80CBC4" stroke-width="0.5" opacity="0.1"/>
  <!-- Top rounded accent -->
  <path d="M0,0 L595,0 L595,5 Q400,12 200,8 Q100,6 0,5 Z" fill="#80CBC4" opacity="0.3"/>
  <!-- Soft bottom accent -->
  <rect x="0" y="127" width="595" height="3" fill="#80CBC4" opacity="0.3"/>
  <!-- Left decorative arc -->
  <path d="M25,25 Q25,65 25,105" stroke="#80CBC4" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M20,30 Q20,65 20,100" stroke="#80CBC4" stroke-width="1" fill="none" opacity="0.15" stroke-linecap="round"/>
  <!-- Company name -->
  <text x="45" y="55" font-family="system-ui, sans-serif" font-size="30" font-weight="bold" fill="#FFFFFF" letter-spacing="1">Aegis Life</text>
  <!-- Subtitle -->
  <text x="47" y="78" font-family="system-ui, sans-serif" font-size="11" fill="#80CBC4" letter-spacing="1.5">Life · Health · Disability · Long-Term Care</text>
  <!-- Soft dot accents -->
  <circle cx="47" cy="98" r="3" fill="#80CBC4" opacity="0.2"/>
  <circle cx="60" cy="100" r="2" fill="#80CBC4" opacity="0.15"/>
  <circle cx="70" cy="101" r="1.5" fill="#80CBC4" opacity="0.1"/>
</svg>