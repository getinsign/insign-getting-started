<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 130">
  <defs>
    <linearGradient id="bp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="595" height="130" fill="url(#bp-bg)"/>
  <!-- Blueprint grid pattern -->
  <g stroke="#26A69A" stroke-width="0.3" opacity="0.1">
    <!-- Vertical lines -->
    <line x1="30" y1="0" x2="30" y2="130"/><line x1="60" y1="0" x2="60" y2="130"/><line x1="90" y1="0" x2="90" y2="130"/><line x1="120" y1="0" x2="120" y2="130"/><line x1="150" y1="0" x2="150" y2="130"/><line x1="180" y1="0" x2="180" y2="130"/><line x1="210" y1="0" x2="210" y2="130"/><line x1="240" y1="0" x2="240" y2="130"/><line x1="270" y1="0" x2="270" y2="130"/><line x1="300" y1="0" x2="300" y2="130"/><line x1="330" y1="0" x2="330" y2="130"/><line x1="360" y1="0" x2="360" y2="130"/><line x1="390" y1="0" x2="390" y2="130"/><line x1="420" y1="0" x2="420" y2="130"/><line x1="450" y1="0" x2="450" y2="130"/><line x1="480" y1="0" x2="480" y2="130"/><line x1="510" y1="0" x2="510" y2="130"/><line x1="540" y1="0" x2="540" y2="130"/><line x1="570" y1="0" x2="570" y2="130"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="15" x2="595" y2="15"/><line x1="0" y1="30" x2="595" y2="30"/><line x1="0" y1="45" x2="595" y2="45"/><line x1="0" y1="60" x2="595" y2="60"/><line x1="0" y1="75" x2="595" y2="75"/><line x1="0" y1="90" x2="595" y2="90"/><line x1="0" y1="105" x2="595" y2="105"/><line x1="0" y1="120" x2="595" y2="120"/>
  </g>
  <!-- Architectural drawing element -->
  <g stroke="#26A69A" stroke-width="0.6" fill="none" opacity="0.12">
    <rect x="400" y="20" width="60" height="40"/>
    <line x1="400" y1="40" x2="460" y2="40"/>
    <rect x="470" y="30" width="80" height="50"/>
    <line x1="510" y1="30" x2="510" y2="80"/>
    <circle cx="430" cy="30" r="5"/>
    <!-- Dimension arrows -->
    <line x1="400" y1="68" x2="460" y2="68"/>
    <line x1="400" y1="65" x2="400" y2="71"/>
    <line x1="460" y1="65" x2="460" y2="71"/>
  </g>
  <!-- Left teal accent bar -->
  <rect x="0" y="0" width="6" height="130" fill="#26A69A" opacity="0.7"/>
  <!-- Top border -->
  <rect x="0" y="0" width="595" height="1.5" fill="#26A69A" opacity="0.4"/>
  <!-- Bottom border -->
  <rect x="0" y="128.5" width="595" height="1.5" fill="#26A69A" opacity="0.4"/>
  <!-- Company name -->
  <text x="25" y="55" font-family="monospace" font-size="26" font-weight="bold" fill="#FFFFFF" letter-spacing="2">BluePrint Design Studio</text>
  <!-- Subtitle -->
  <text x="27" y="78" font-family="monospace" font-size="9.5" fill="#26A69A" letter-spacing="1.5">Architecture · Engineering · Digital Planning</text>
  <!-- Technical label style -->
  <text x="27" y="110" font-family="monospace" font-size="7" fill="#26A69A" opacity="0.4">REF: DOCUMENT HEADER // SCALE 1:1</text>
  <!-- Corner crosshairs -->
  <g stroke="#26A69A" stroke-width="0.5" opacity="0.25">
    <line x1="575" y1="10" x2="585" y2="10"/><line x1="580" y1="5" x2="580" y2="15"/>
    <line x1="575" y1="120" x2="585" y2="120"/><line x1="580" y1="115" x2="580" y2="125"/>
  </g>
</svg>