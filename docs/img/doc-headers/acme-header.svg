<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 130">
  <defs>
    <linearGradient id="acme-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2838"/>
      <stop offset="60%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1B2838"/>
    </linearGradient>
    <linearGradient id="acme-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#42A5F5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="595" height="130" fill="url(#acme-bg)"/>
  <!-- Circuit-board dot grid -->
  <g fill="#42A5F5" opacity="0.08">
    <circle cx="20" cy="20" r="2"/><circle cx="50" cy="20" r="2"/><circle cx="80" cy="20" r="2"/><circle cx="110" cy="20" r="2"/><circle cx="140" cy="20" r="2"/><circle cx="170" cy="20" r="2"/><circle cx="200" cy="20" r="2"/><circle cx="230" cy="20" r="2"/><circle cx="260" cy="20" r="2"/><circle cx="290" cy="20" r="2"/><circle cx="320" cy="20" r="2"/><circle cx="350" cy="20" r="2"/><circle cx="380" cy="20" r="2"/><circle cx="410" cy="20" r="2"/><circle cx="440" cy="20" r="2"/><circle cx="470" cy="20" r="2"/><circle cx="500" cy="20" r="2"/><circle cx="530" cy="20" r="2"/><circle cx="560" cy="20" r="2"/>
    <circle cx="20" cy="45" r="2"/><circle cx="50" cy="45" r="2"/><circle cx="80" cy="45" r="2"/><circle cx="110" cy="45" r="2"/><circle cx="140" cy="45" r="2"/><circle cx="170" cy="45" r="2"/><circle cx="200" cy="45" r="2"/><circle cx="230" cy="45" r="2"/><circle cx="260" cy="45" r="2"/><circle cx="290" cy="45" r="2"/><circle cx="320" cy="45" r="2"/><circle cx="350" cy="45" r="2"/><circle cx="380" cy="45" r="2"/><circle cx="410" cy="45" r="2"/><circle cx="440" cy="45" r="2"/><circle cx="470" cy="45" r="2"/><circle cx="500" cy="45" r="2"/><circle cx="530" cy="45" r="2"/><circle cx="560" cy="45" r="2"/>
    <circle cx="20" cy="70" r="2"/><circle cx="50" cy="70" r="2"/><circle cx="80" cy="70" r="2"/><circle cx="110" cy="70" r="2"/><circle cx="140" cy="70" r="2"/><circle cx="170" cy="70" r="2"/><circle cx="200" cy="70" r="2"/><circle cx="230" cy="70" r="2"/><circle cx="260" cy="70" r="2"/><circle cx="290" cy="70" r="2"/><circle cx="320" cy="70" r="2"/><circle cx="350" cy="70" r="2"/><circle cx="380" cy="70" r="2"/><circle cx="410" cy="70" r="2"/><circle cx="440" cy="70" r="2"/><circle cx="470" cy="70" r="2"/><circle cx="500" cy="70" r="2"/><circle cx="530" cy="70" r="2"/><circle cx="560" cy="70" r="2"/>
    <circle cx="20" cy="95" r="2"/><circle cx="50" cy="95" r="2"/><circle cx="80" cy="95" r="2"/><circle cx="110" cy="95" r="2"/><circle cx="140" cy="95" r="2"/><circle cx="170" cy="95" r="2"/><circle cx="200" cy="95" r="2"/><circle cx="230" cy="95" r="2"/><circle cx="260" cy="95" r="2"/><circle cx="290" cy="95" r="2"/><circle cx="320" cy="95" r="2"/><circle cx="350" cy="95" r="2"/><circle cx="380" cy="95" r="2"/><circle cx="410" cy="95" r="2"/><circle cx="440" cy="95" r="2"/><circle cx="470" cy="95" r="2"/><circle cx="500" cy="95" r="2"/><circle cx="530" cy="95" r="2"/><circle cx="560" cy="95" r="2"/>
    <circle cx="20" cy="120" r="2"/><circle cx="50" cy="120" r="2"/><circle cx="80" cy="120" r="2"/><circle cx="110" cy="120" r="2"/><circle cx="140" cy="120" r="2"/><circle cx="170" cy="120" r="2"/><circle cx="200" cy="120" r="2"/><circle cx="230" cy="120" r="2"/><circle cx="260" cy="120" r="2"/><circle cx="290" cy="120" r="2"/><circle cx="320" cy="120" r="2"/><circle cx="350" cy="120" r="2"/><circle cx="380" cy="120" r="2"/><circle cx="410" cy="120" r="2"/><circle cx="440" cy="120" r="2"/><circle cx="470" cy="120" r="2"/><circle cx="500" cy="120" r="2"/><circle cx="530" cy="120" r="2"/><circle cx="560" cy="120" r="2"/>
