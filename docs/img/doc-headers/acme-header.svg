  <!-- Circuit trace lines -->
  <g stroke="#42A5F5" stroke-width="1" opacity="0.06" fill="none">
    <path d="M50,20 L80,20 L80,45 L140,45"/>
    <path d="M200,70 L260,70 L260,95 L320,95"/>
    <path d="M380,20 L380,45 L440,45 L440,70"/>
    <path d="M500,45 L530,45 L530,95"/>
    <path d="M110,95 L170,95 L170,120 L230,120"/>
  </g>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="595" height="4" fill="url(#acme-bar)"/>
  <!-- Bottom accent line -->
  <rect x="30" y="120" width="200" height="2" fill="#42A5F5" opacity="0.4"/>
  <!-- Company name -->
  <text x="35" y="58" font-family="system-ui, sans-serif" font-size="30" font-weight="bold" fill="#FFFFFF" letter-spacing="3">ACME Corporation</text>
  <!-- Subtitle -->
  <text x="37" y="82" font-family="system-ui, sans-serif" font-size="11" fill="#42A5F5" letter-spacing="1">Digital Transformation &amp; Enterprise Solutions</text>
  <!-- Decorative corner element -->
  <rect x="30" y="38" width="3" height="50" fill="#42A5F5" opacity="0.6"/>
