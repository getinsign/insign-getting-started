<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 130">
  <defs>
    <linearGradient id="gl-bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#1B2F1B"/>
      <stop offset="50%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#1B2F1B"/>
    </linearGradient>
    <linearGradient id="gl-leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66BB6A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#66BB6A" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="595" height="130" fill="url(#gl-bg)"/>
  <!-- Organic flowing curves -->
  <path d="M0,130 Q100,80 200,100 T400,70 T595,90 L595,130 Z" fill="#66BB6A" opacity="0.06"/>
  <path d="M0,120 Q150,60 300,90 T595,60 L595,130 Z" fill="#66BB6A" opacity="0.04"/>
  <!-- Leaf vein pattern top-right -->
  <g stroke="#66BB6A" stroke-width="0.8" fill="none" opacity="0.08">
    <path d="M480,10 Q500,40 520,60 Q540,80 570,90"/>
    <path d="M490,10 Q500,30 495,50"/>
    <path d="M500,25 Q515,35 510,55"/>
    <path d="M510,40 Q530,50 525,70"/>
    <path d="M525,55 Q545,65 540,80"/>
    <path d="M540,70 Q555,75 560,85"/>
  </g>
  <!-- Large decorative leaf silhouette -->
  <path d="M550,0 Q490,30 480,80 Q510,60 560,50 Q530,40 550,0 Z" fill="url(#gl-leaf)"/>
  <!-- Left decorative leaf accent -->
  <path d="M0,50 Q20,30 40,35 Q30,50 35,70 Q15,60 0,50 Z" fill="#66BB6A" opacity="0.1"/>
  <!-- Green accent bar bottom -->
  <rect x="0" y="126" width="595" height="4" fill="#66BB6A" opacity="0.5"/>
  <!-- Small dot accents -->
  <circle cx="35" cy="108" r="3" fill="#66BB6A" opacity="0.3"/>
  <circle cx="47" cy="108" r="2" fill="#66BB6A" opacity="0.2"/>
  <circle cx="56" cy="108" r="1.5" fill="#66BB6A" opacity="0.15"/>
  <!-- Company name -->
  <text x="40" y="52" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" letter-spacing="1">GreenLeaf Sustainability</text>
  <!-- Subtitle -->
  <text x="42" y="76" font-family="system-ui, sans-serif" font-size="10.5" fill="#66BB6A" letter-spacing="2">Clean Energy · Smart Agriculture · Carbon Neutral</text>
  <!-- Thin accent line under title -->
  <line x1="40" y1="58" x2="180" y2="58" stroke="#66BB6A" stroke-width="1" opacity="0.3"/>
</svg>