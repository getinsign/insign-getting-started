<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 130">
  <defs>
    <linearGradient id="nx-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2440"/>
      <stop offset="50%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#0F2440"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="595" height="130" fill="url(#nx-bg)"/>
  <!-- Connected node network dots -->
  <g opacity="0.08">
    <!-- Nodes -->
    <circle cx="380" cy="25" r="3" fill="#C9963A"/>
    <circle cx="440" cy="40" r="2.5" fill="#C9963A"/>
    <circle cx="500" cy="20" r="2" fill="#C9963A"/>
    <circle cx="530" cy="55" r="3" fill="#C9963A"/>
    <circle cx="460" cy="75" r="2" fill="#C9963A"/>
    <circle cx="400" cy="90" r="2.5" fill="#C9963A"/>
    <circle cx="550" cy="95" r="2" fill="#C9963A"/>
    <circle cx="490" cy="105" r="3" fill="#C9963A"/>
    <circle cx="350" cy="60" r="2" fill="#C9963A"/>
    <circle cx="570" cy="35" r="2" fill="#C9963A"/>
    <!-- Connections -->
    <line x1="380" y1="25" x2="440" y2="40" stroke="#C9963A" stroke-width="0.5"/>
    <line x1="440" y1="40" x2="500" y2="20" stroke="#C9963A" stroke-width="0.5"/>
    <line x1="440" y1="40" x2="530" y2="55" stroke="#C9963A" stroke-width="0.5"/>
    <line x1="530" y1="55" x2="460" y2="75" stroke="#C9963A" stroke-width="0.5"/>
    <line x1="460" y1="75" x2="400" y2="90" stroke="#C9963A" stroke-width="0.5"/>
    <line x1="530" y1="55" x2="550" y2="95" stroke="#C9963A" stroke-width="0.5"/>
    <line x1="460" y1="75" x2="490" y2="105" stroke="#C9963A" stroke-width="0.5"/>
    <line x1="350" y1="60" x2="380" y2="25" stroke="#C9963A" stroke-width="0.5"/>
    <line x1="350" y1="60" x2="400" y2="90" stroke="#C9963A" stroke-width="0.5"/>
    <line x1="500" y1="20" x2="570" y2="35" stroke="#C9963A" stroke-width="0.5"/>
    <line x1="570" y1="35" x2="530" y2="55" stroke="#C9963A" stroke-width="0.5"/>
    <line x1="550" y1="95" x2="490" y2="105" stroke="#C9963A" stroke-width="0.5"/>
  </g>
  <!-- Thin gold lines - refined horizontal -->
  <line x1="0" y1="0" x2="595" y2="0" stroke="#C9963A" stroke-width="1.5"/>
  <line x1="0" y1="3" x2="595" y2="3" stroke="#C9963A" stroke-width="0.3" opacity="0.4"/>
  <line x1="0" y1="129" x2="595" y2="129" stroke="#C9963A" stroke-width="1"/>
  <line x1="0" y1="126" x2="595" y2="126" stroke="#C9963A" stroke-width="0.3" opacity="0.3"/>
  <!-- Left gold accent bar -->
  <rect x="30" y="25" width="2.5" height="70" fill="#C9963A" opacity="0.5"/>
  <!-- Thin gold vertical line -->
  <line x1="26" y1="30" x2="26" y2="90" stroke="#C9963A" stroke-width="0.5" opacity="0.25"/>
  <!-- Company name -->
  <text x="48" y="55" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" letter-spacing="4">Nexus Group</text>
  <!-- Subtitle -->
  <text x="50" y="78" font-family="system-ui, sans-serif" font-size="9.5" fill="#C9963A" letter-spacing="2.5">Venture Capital · M&amp;A Advisory · Growth Partners</text>
  <!-- Refined bottom detail -->
  <line x1="48" y1="88" x2="130" y2="88" stroke="#C9963A" stroke-width="0.5" opacity="0.3"/>
  <!-- Gold diamond -->
  <polygon points="140,88 143,85 146,88 143,91" fill="#C9963A" opacity="0.25"/>
</svg>