<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 130">
  <defs>
    <linearGradient id="pr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="595" height="130" fill="url(#pr-bg)"/>
  <!-- Diagonal color bars - energetic creative style -->
  <polygon points="0,0 80,0 50,130 0,130" fill="#2979FF" opacity="0.15"/>
  <polygon points="60,0 130,0 100,130 30,130" fill="#2979FF" opacity="0.1"/>
  <polygon points="110,0 170,0 140,130 80,130" fill="#FF9100" opacity="0.08"/>
  <polygon points="150,0 200,0 170,130 120,130" fill="#2979FF" opacity="0.06"/>
  <polygon points="450,0 500,0 470,130 420,130" fill="#FF9100" opacity="0.05"/>
  <polygon points="500,0 550,0 520,130 470,130" fill="#2979FF" opacity="0.04"/>
  <polygon points="540,0 595,0 595,90 560,130 510,130" fill="#FF9100" opacity="0.06"/>
  <!-- Top multi-color bar -->
  <rect x="0" y="0" width="200" height="4" fill="#2979FF"/>
  <rect x="200" y="0" width="200" height="4" fill="#FF9100"/>
  <rect x="400" y="0" width="195" height="4" fill="#2979FF"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="127" width="150" height="3" fill="#FF9100" opacity="0.6"/>
  <rect x="150" y="127" width="150" height="3" fill="#2979FF" opacity="0.4"/>
  <!-- Company name -->
  <text x="50" y="60" font-family="system-ui, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" letter-spacing="2">Prism Digital</text>
  <!-- Colorful accent on first letter -->
  <text x="50" y="60" font-family="system-ui, sans-serif" font-size="36" font-weight="bold" fill="#FF9100" letter-spacing="2" opacity="0.5">P</text>
  <!-- Subtitle -->
  <text x="52" y="84" font-family="system-ui, sans-serif" font-size="11" fill="#FF9100" letter-spacing="2">Creative Agency · Digital Media · Brand Strategy</text>
  <!-- Decorative colored dots -->
  <circle cx="52" cy="105" r="4" fill="#2979FF" opacity="0.4"/>
  <circle cx="66" cy="105" r="4" fill="#FF9100" opacity="0.4"/>
  <circle cx="80" cy="105" r="4" fill="#2979FF" opacity="0.25"/>
  <circle cx="94" cy="105" r="4" fill="#FF9100" opacity="0.15"/>
  <!-- Right side accent blocks -->
  <rect x="550" y="100" width="15" height="15" fill="#2979FF" opacity="0.15" rx="2"/>
  <rect x="530" y="105" width="12" height="12" fill="#FF9100" opacity="0.1" rx="2"/>
</svg>