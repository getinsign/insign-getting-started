<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 130">
  <defs>
    <linearGradient id="nova-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#212121"/>
      <stop offset="40%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#212121"/>
    </linearGradient>
    <linearGradient id="nova-stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF5350" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#EF5350" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="595" height="130" fill="url(#nova-bg)"/>
  <!-- Diagonal stripes -->
  <g opacity="0.07" fill="#EF5350">
    <polygon points="0,0 40,0 130,130 90,130"/>
    <polygon points="60,0 100,0 190,130 150,130"/>
    <polygon points="120,0 160,0 250,130 210,130"/>
    <polygon points="180,0 220,0 310,130 270,130"/>
    <polygon points="240,0 280,0 370,130 330,130"/>
    <polygon points="300,0 340,0 430,130 390,130"/>
    <polygon points="360,0 400,0 490,130 450,130"/>
    <polygon points="420,0 460,0 550,130 510,130"/>
    <polygon points="480,0 520,0 595,105 595,130 570,130"/>
    <polygon points="540,0 580,0 595,20 595,75"/>
  </g>
  <!-- Bold angular accent shape -->
  <polygon points="0,0 0,130 25,130 80,0" fill="#B71C1C" opacity="0.4"/>
  <polygon points="0,0 0,10 595,10 595,0" fill="#EF5350" opacity="0.6"/>
  <!-- Red accent bar -->
  <rect x="0" y="0" width="595" height="3" fill="#EF5350"/>
  <!-- Sharp angle bottom-left -->
  <polygon points="0,100 0,130 120,130" fill="#EF5350" opacity="0.15"/>
  <!-- Company name -->
  <text x="100" y="60" font-family="system-ui, sans-serif" font-size="34" font-weight="bold" fill="#FFFFFF" letter-spacing="6">NOVA Finance</text>
  <!-- Subtitle -->
  <text x="102" y="84" font-family="system-ui, sans-serif" font-size="10" fill="#EF5350" letter-spacing="2.5">Investment Banking · Asset Management · Insurance</text>
  <!-- Bottom accent -->
  <rect x="100" y="95" width="80" height="2" fill="#EF5350" opacity="0.5"/>
  <rect x="185" y="95" width="30" height="2" fill="#EF5350" opacity="0.3"/>
</svg>