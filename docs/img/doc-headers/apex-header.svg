<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 130">
  <defs>
    <linearGradient id="ax-bg" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#311B92"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
    <radialGradient id="ax-glow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ax-peak" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#4A148C" stop-opacity="0"/>
      <stop offset="100%" stop-color="#CE93D8" stop-opacity="0.12"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="595" height="130" fill="url(#ax-bg)"/>
  <!-- Glow effect -->
  <rect width="595" height="130" fill="url(#ax-glow)"/>
  <!-- Mountain peak silhouette background -->
  <polygon points="380,130 480,30 580,130" fill="url(#ax-peak)"/>
  <polygon points="420,130 500,50 580,130" fill="#CE93D8" opacity="0.03"/>
  <polygon points="350,130 440,55 530,130" fill="#CE93D8" opacity="0.02"/>
  <!-- Mountain ridge line -->
  <polyline points="300,130 380,80 430,95 480,30 530,70 580,50 595,55" stroke="#CE93D8" stroke-width="0.8" fill="none" opacity="0.1"/>
  <!-- Top glow line -->
  <rect x="0" y="0" width="595" height="2" fill="#CE93D8" opacity="0.5"/>
  <!-- Glow highlight -->
  <rect x="150" y="0" width="200" height="1" fill="#CE93D8" opacity="0.3"/>
  <!-- Company name - right-aligned text, left-weighted mountain -->
  <text x="40" y="55" font-family="system-ui, sans-serif" font-size="34" font-weight="bold" fill="#FFFFFF" letter-spacing="3">Apex Assurance</text>
  <!-- Subtle glow behind text -->
  <text x="40" y="55" font-family="system-ui, sans-serif" font-size="34" font-weight="bold" fill="#CE93D8" letter-spacing="3" opacity="0.1" dx="1" dy="1">Apex Assurance</text>
  <!-- Subtitle -->
  <text x="42" y="80" font-family="system-ui, sans-serif" font-size="10" fill="#CE93D8" letter-spacing="2">Commercial · Property · Casualty · Specialty</text>
  <!-- Accent elements -->
  <line x1="40" y1="90" x2="160" y2="90" stroke="#CE93D8" stroke-width="1" opacity="0.25"/>
  <line x1="40" y1="94" x2="100" y2="94" stroke="#CE93D8" stroke-width="0.5" opacity="0.15"/>
  <!-- Decorative peak accent -->
  <polygon points="37,35 40,28 43,35" fill="#CE93D8" opacity="0.4"/>
  <!-- Bottom accent -->
  <rect x="0" y="128" width="595" height="2" fill="#CE93D8" opacity="0.3"/>
</svg>