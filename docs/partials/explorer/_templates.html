<!-- ====================================================================
     TEMPLATES - cloned by JS instead of building HTML strings
     ==================================================================== -->

<!-- Operation tab button (generated by app-init.js from operations.json) -->
<template id="tpl-operation-tab">
    <li class="nav-item" role="presentation">
        <button class="nav-link" data-bs-toggle="tab" type="button">
            <i></i> <span class="op-tab-label"></span>
        </button>
    </li>
</template>

<!-- Operation tab pane - standard layout (generated by app-init.js from operations.json) -->
<template id="tpl-operation-pane">
    <div class="tab-pane fade" role="tabpanel">
        <div class="card-insign">
            <div class="card-header">
                <span class="badge-method"></span>
                <span class="endpoint-path"></span>
                <h5 class="ms-auto mb-0" style="font-size:0.9rem"></h5>
            </div>
            <div class="card-body">
                <p class="text-muted-sm mb-3 op-description"></p>
                <div class="section-title">Request Headers</div>
                <div class="headers-display mb-3 op-headers"></div>
                <div class="op-body-section">
                    <div class="section-title">Request Body</div>
                    <div class="editor-container op-editor"></div>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button class="btn btn-insign btn-insign-primary op-send-btn">
                        <i class="bi bi-send"></i> <span>Send</span>
                    </button>
                </div>
                <div class="op-response d-none">
                    <div class="section-title mt-3">Response</div>
                    <div class="response-panel">
                        <div class="response-status"></div>
                        <div class="editor-container op-response-editor"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>

<!-- Trace sidebar entry (app-boot.js) -->
<template id="tpl-trace-entry">
    <div class="trace-entry">
        <div class="trace-summary" onclick="this.parentElement.classList.toggle('open')">
            <span class="trace-method"></span>
            <span class="trace-path"></span>
            <span class="trace-proxy-badge d-none" title=""><i class="bi bi-shuffle"></i> proxy</span>
            <span class="trace-status"></span>
            <span class="trace-duration"></span>
        </div>
        <div class="trace-detail">
            <div class="trace-desc d-none"></div>
            <div class="trace-time"></div>
            <div class="trace-url"></div>
            <div class="trace-section-label">Request Headers</div>
            <div class="trace-headers" data-slot="req-headers"></div>
            <div class="trace-section-label">Request Body <button class="btn-copy-json" title="Copy to clipboard"><i class="bi bi-clipboard"></i></button></div>
            <div class="trace-body-preview" data-slot="req-body"></div>
            <div class="trace-section-label">Response Headers</div>
            <div class="trace-headers" data-slot="resp-headers"></div>
            <div class="trace-section-label">Response Body <button class="btn-copy-json" title="Copy to clipboard"><i class="bi bi-clipboard"></i></button></div>
            <div class="trace-body-preview" data-slot="resp-body"></div>
        </div>
    </div>
</template>

<!-- API header row (app-api.js) -->
<template id="tpl-header-row">
    <div><span class="header-name"></span> <span class="header-value"></span></div>
</template>

<!-- Poll initial-status card (app-ui.js) -->
<template id="tpl-poll-full-card">
    <div class="webhook-entry">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <span>
                <span class="webhook-method">STATUS</span>
                <span class="webhook-time ms-2"></span>
            </span>
            <span class="badge bg-info" style="font-size:0.65rem">initial</span>
        </div>
        <pre class="poll-body-pre" style="font-size:0.7rem;margin:0;max-height:300px;overflow:auto;background:rgba(0,0,0,0.2);padding:6px;border-radius:4px;white-space:pre-wrap;word-break:break-all"></pre>
    </div>
</template>

<!-- Poll change-detection card (app-ui.js) -->
<template id="tpl-poll-change-card">
    <div class="webhook-entry">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <span>
                <span class="webhook-method">STATUS</span>
                <span class="webhook-time ms-2"></span>
            </span>
            <span class="badge bg-warning" style="font-size:0.65rem" data-slot="change-count"></span>
        </div>
        <div data-slot="diff-rows"></div>
    </div>
</template>

<!-- Single diff row inside a change card (app-ui.js) -->
<template id="tpl-poll-diff-row">
    <div class="poll-diff-row" style="font-size:0.73rem;margin-bottom:2px;line-height:1.4;padding:2px 6px;border-radius:3px;word-break:break-word;white-space:pre-wrap;font-family:monospace">
        <span class="diff-label" style="display:inline-block;min-width:14px;text-align:center;font-weight:700"></span>
        <span class="diff-path"></span>
        <span class="diff-value"></span>
    </div>
</template>

<!-- Uploaded document grid item (app-documents.js) -->
<template id="tpl-doc-upload-item">
    <div class="doc-dd-item">
        <canvas class="doc-dd-thumb skeleton-pulse" width="80" height="106"></canvas>
        <div class="doc-dd-info">
            <div class="doc-dd-title"><img src="favicon.png" class="doc-dd-logo" alt=""><span class="doc-dd-label"></span></div>
            <div class="doc-dd-meta">
                <span data-slot="size"></span>
                <span class="doc-dd-sep"></span>
                <span data-slot="date"></span>
            </div>
        </div>
    </div>
</template>

<!-- Branded contract grid item (app-documents.js) -->
<template id="tpl-doc-brand-item">
    <div class="doc-dd-item">
        <canvas class="doc-dd-thumb skeleton-pulse" width="80" height="106"></canvas>
        <div class="doc-dd-info">
            <div class="doc-dd-title">
                <img class="doc-dd-logo d-none" alt="">
                <span class="doc-dd-label"></span>
            </div>
            <div class="doc-dd-meta">
                <span data-slot="pages"></span>
                <span class="doc-dd-sep"></span>
                <span>3 SIG-tags</span>
                <span class="doc-dd-sep d-none" data-slot="size-sep"></span>
                <span class="d-none" data-slot="size"></span>
            </div>
            <div class="doc-dd-roles"></div>
        </div>
    </div>
</template>

<!-- Hidden document grid item (app-documents.js) -->
<template id="tpl-doc-hidden-item">
    <div class="doc-dd-item doc-dd-item-hidden">
        <div class="doc-dd-thumb doc-dd-thumb-icon" style="opacity:0.4"><i class="bi bi-eye-slash"></i></div>
        <div class="doc-dd-info">
            <div class="doc-dd-title" style="opacity:0.5"></div>
            <div class="doc-dd-meta"><span>Click to restore</span></div>
        </div>
    </div>
</template>

<!-- Document rename/delete actions (app-documents.js) -->
<template id="tpl-doc-actions">
    <span class="doc-dd-actions">
        <span class="doc-dd-action" title="Rename"><i class="bi bi-pencil"></i></span>
        <span class="doc-dd-action doc-dd-action-danger" title="Delete"><i class="bi bi-trash3"></i></span>
    </span>
</template>

<!-- Signing-link card (app-operations.js) -->
<template id="tpl-signing-link-card">
    <div class="signing-link-card mb-2 p-3" style="background:rgba(1,101,188,0.04);border-radius:8px;border:1px solid rgba(1,101,188,0.12)">
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <i class="bi bi-person-circle" style="color:var(--insign-blue);font-size:1.4rem"></i>
            <div>
                <strong data-slot="name"></strong>
                <span data-slot="roles"></span>
            </div>
            <div class="ms-auto d-flex gap-1">
                <a href="#" target="_blank" rel="noopener" class="btn btn-insign btn-insign-sm btn-insign-cta" data-slot="open-link">
                    <i class="bi bi-box-arrow-up-right"></i> Open
                </a>
                <button class="btn btn-insign btn-insign-sm btn-insign-outline" data-slot="copy-btn">
                    <i class="bi bi-clipboard"></i> Copy
                </button>
            </div>
        </div>
        <div class="d-none d-flex flex-wrap gap-2 mt-2" style="font-size:0.75rem;color:var(--insign-dark)" data-slot="chips"></div>
        <div class="text-mono text-muted-sm mt-2" style="font-size:0.7rem;word-break:break-all;opacity:0.7" data-slot="link-display"></div>
    </div>
</template>

<!-- Webhook URL section (webhook-viewer.js) -->
<template id="tpl-webhook-url">
    <div>
        <div class="webhook-url-display">
            <i class="bi bi-broadcast text-muted"></i>
            <input type="text" readonly value="" id="webhook-url-input" name="webhook-url">
            <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="window.webhookViewer.copyUrl()" title="Copy URL">
                <i class="bi bi-clipboard"></i>
            </button>
        </div>
        <div class="text-muted-sm mt-1">
            Use as <code>serverSidecallbackURL</code>. Provider: <strong data-slot="provider"></strong> <span class="d-none" data-slot="badge"></span>
        </div>
    </div>
</template>

<!-- Webhook request entry (webhook-viewer.js) -->
<template id="tpl-webhook-entry">
    <div class="webhook-entry">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <span>
                <span class="webhook-method"></span>
                <span class="webhook-time ms-2"></span>
            </span>
            <button class="btn btn-insign btn-insign-sm btn-insign-outline" data-slot="details-toggle">
                <i class="bi bi-chevron-down"></i> Details
            </button>
        </div>
        <div class="collapse" data-slot="details">
            <div class="wh-section-toggle text-muted-sm mt-1 d-none" style="cursor:pointer;user-select:none" data-slot="headers-toggle">
                <i class="bi bi-chevron-right wh-chevron"></i> Headers <span class="badge bg-secondary" style="font-size:0.6rem" data-slot="headers-count"></span>
            </div>
            <div class="collapse d-none" data-slot="headers-panel">
                <pre class="wh-pre wh-headers"></pre>
            </div>
            <div class="d-none" data-slot="body-section">
                <div class="text-muted-sm mt-2 mb-1"><i class="bi bi-braces"></i> Body</div>
                <pre class="wh-pre wh-body"></pre>
            </div>
        </div>
    </div>
</template>

<!-- Webhook error alert (webhook-viewer.js) -->
<template id="tpl-webhook-error">
    <div class="alert alert-warning alert-insign" role="alert">
        <i class="bi bi-exclamation-triangle"></i>
        <div><strong>Webhook service unavailable</strong><br><span data-slot="message"></span></div>
    </div>
</template>

<!-- Feature group container (app-persistence.js) -->
<template id="tpl-feature-group">
    <div class="feature-group mb-2">
        <div class="feature-group-header" style="cursor:pointer">
            <i class="bi" style="color:var(--insign-blue)"></i>
            <strong style="font-size:0.85rem"></strong>
            <i class="bi bi-chevron-down ms-auto" style="font-size:0.7rem"></i>
        </div>
        <div class="collapse"></div>
    </div>
</template>

<!-- Feature toggle: boolean (app-persistence.js) -->
<template id="tpl-feature-bool">
    <div class="feature-toggle">
        <div class="tri-state">
            <input type="radio" value="default">
            <label>Default</label>
            <input type="radio" value="on">
            <label>On</label>
            <input type="radio" value="off">
            <label>Off</label>
        </div>
        <i class="bi bi-info-circle feature-info-btn" title="Click to pin description"></i>
        <span class="feature-label"><span class="feature-key"></span></span>
        <div class="feature-desc"></div>
    </div>
</template>

<!-- Feature toggle: select (app-persistence.js) -->
<template id="tpl-feature-select">
    <div class="feature-toggle">
        <select class="form-select form-select-sm" style="max-width:110px;flex-shrink:0"></select>
        <i class="bi bi-info-circle feature-info-btn" title="Click to pin description"></i>
        <span class="feature-label"><span class="feature-key"></span></span>
        <div class="feature-desc"></div>
    </div>
</template>

<!-- Feature toggle: text (app-persistence.js) -->
<template id="tpl-feature-text">
    <div class="feature-toggle">
        <input type="text" class="form-control form-control-sm feature-input" placeholder="Default" style="max-width:160px;flex-shrink:0">
        <i class="bi bi-info-circle feature-info-btn" title="Click to pin description"></i>
        <span class="feature-label"><span class="feature-key"></span></span>
        <div class="feature-desc"></div>
    </div>
</template>
