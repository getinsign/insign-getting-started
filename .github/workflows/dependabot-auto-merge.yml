name: Dependabot Auto-Merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
    # Dependabot-triggered workflows get a read-only GITHUB_TOKEN, and the
    # same actor can't approve its own PR. Use the app token (distinct
    # identity, write-scoped) for approve + merge instead.
    - name: Generate app token
      id: app-token
      uses: actions/create-github-app-token@v3
      with:
        app-id: 3413260
        private-key: ${{ secrets.VENDOR_REBUILD_APP_PRIVATE_KEY }}

    - name: Fetch Dependabot metadata
      id: metadata
      uses: dependabot/fetch-metadata@v3
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Wait for CI to pass
      uses: lewagon/wait-on-check-action@v1.7.0
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        running-workflow-name: 'auto-merge'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        wait-interval: 30
        allowed-conclusions: success,skipped

    - name: Approve PR
      if: steps.metadata.outputs.update-type != 'version-update:semver-major'
      run: gh pr review --approve "$PR_URL"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GH_TOKEN: ${{ steps.app-token.outputs.token }}

    - name: Enable auto-merge (minor/patch updates)
      if: steps.metadata.outputs.update-type != 'version-update:semver-major'
      run: gh pr merge --auto --squash "$PR_URL"
      env:
        PR_URL: ${{ github.event.pull_request.html_url }}
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
