name: Codegen Structural Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structural:
    name: structural check + javac compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download gson into local Maven cache
        run: |
          GSON_VERSION=2.11.0
          GSON_DIR="$HOME/.m2/repository/com/google/code/gson/gson/${GSON_VERSION}"
          mkdir -p "$GSON_DIR"
          curl -sSLf \
            "https://repo1.maven.org/maven2/com/google/code/gson/gson/${GSON_VERSION}/gson-${GSON_VERSION}.jar" \
            -o "$GSON_DIR/gson-${GSON_VERSION}.jar"

      - name: Run codegen structural test
        run: node test/codegen-test.js
