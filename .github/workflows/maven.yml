name: Java CI - Build and Publish

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/java/**'
      - '.github/workflows/maven.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/java/**'
      - '.github/workflows/maven.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [spring-client, insign-client]
    name: build (${{ matrix.profile }})
    defaults:
      run:
        working-directory: src/java

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        cache-dependency-path: src/java/pom.xml

    - name: Configure Maven settings.xml
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml <<'EOF'
        <settings>
          <servers>
            <server>
              <id>github</id>
              <username>${env.GITHUB_ACTOR}</username>
              <password>${env.GITHUB_TOKEN}</password>
            </server>
            <server>
              <id>github-getinsign</id>
              <username>${env.GITHUB_ACTOR}</username>
              <password>${env.INSIGN_PACKAGES_TOKEN}</password>
            </server>
          </servers>
        </settings>
        EOF

    - name: Build and Test (${{ matrix.profile }})
      run: |
        if [ "${{ matrix.profile }}" = "insign-client" ]; then
          mvn -B clean verify -P'!spring-client' -Pinsign-client
        else
          mvn -B clean verify -Pspring-client
        fi
      env:
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        INSIGN_PACKAGES_TOKEN: ${{ secrets.INSIGN_PACKAGES_TOKEN }}

    - name: Publish Test Results
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: Test Results (${{ matrix.profile }})
        path: src/java/**/target/surefire-reports/*.xml
        reporter: java-junit

    - name: JaCoCo Coverage Report
      uses: madrapps/jacoco-report@v1.7.2
      if: always()
      with:
        paths: src/java/**/target/site/jacoco/jacoco.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        title: Coverage (${{ matrix.profile }})
        update-comment: true
        min-coverage-overall: 0
        min-coverage-changed-files: 0
