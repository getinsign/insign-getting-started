# inSign API Configuration
# Override via environment variables: INSIGN_BASE_URL, INSIGN_USERNAME, INSIGN_PASSWORD
insign.api.base-url=${INSIGN_BASE_URL:https://sandbox.test.getinsign.show}
insign.api.username=${INSIGN_USERNAME:controller}
insign.api.password=${INSIGN_PASSWORD:pwd.insign.sandbox.4561}

# Server port
server.port=8090

# Shut down immediately on Ctrl+C
server.shutdown=immediate

# Webhook callback URL (set to your public URL, e.g. via ngrok)
# insign.webhook.callback-url=https://your-public-url.ngrok.io/webhook

# Thank-you page URL shown to signer after completion
insign.thankyou.url=http://localhost:8090/thankyou.html

# Polling interval in seconds (used when webhook is not configured)
insign.polling.interval-seconds=5

# Disable console runner (webapp mode)
app.console.enabled=false
