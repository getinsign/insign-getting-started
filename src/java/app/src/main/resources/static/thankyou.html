<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>document.documentElement.setAttribute('data-theme','dark')</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body class="thankyou-body">
    <div class="thankyou-card p-5">
        <div class="thankyou-icon mb-3"><i class="bi bi-check-circle-fill"></i></div>
        <h2 class="mb-3">Thank you!</h2>
        <p class="text-muted mb-4">Your signing process is complete. You can safely close this window now.</p>
        <button class="btn btn-insign btn-insign-primary btn-lg" onclick="closeWindow()">
            <i class="bi bi-x-lg me-2"></i>Close Window
        </button>
    </div>
    <script>
    function closeWindow() {
        window.close();
        // Fallback if window.close() is blocked by the browser
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh">'
            + '<h3 style="color:var(--insign-gray)">You can close this tab now.</h3></div>';
    }
    </script>
</body>
</html>
