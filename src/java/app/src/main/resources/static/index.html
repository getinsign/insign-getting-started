<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>document.documentElement.setAttribute('data-theme','dark')</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inSign API - Getting Started Java Sample Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-insign">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="bi bi-pen me-2"></i>inSign API - Getting Started Java Sample Application
            </span>
            <span class="badge badge-version" id="version-badge"></span>
        </div>
    </nav>

    <div id="alert-area"></div>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- Left column: Actions -->
            <div class="col-md-4 col-lg-3">

                <button class="btn btn-insign btn-insign-primary w-100 mb-3" id="btn-create" onclick="createSession()">
                    <i class="bi bi-plus-circle me-1"></i> Create Session
                </button>

                <div id="session-actions" style="display:none">
                    <div class="section-title">Session Info</div>
                    <div class="d-flex flex-wrap gap-1">
                        <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="apiGet('/api/session/status', 'Status')">
                            <i class="bi bi-info-circle me-1"></i>Status</button>
                        <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="apiGet('/api/session/checkstatus', 'Check Status')">
                            <i class="bi bi-arrow-repeat me-1"></i>Check Status</button>
                        <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="apiGet('/api/session/metadata', 'Session Data')">
                            <i class="bi bi-file-earmark-text me-1"></i>Session Data</button>
                        <button class="btn btn-insign btn-insign-sm btn-insign-cta" onclick="getOwnerLink()">
                            <i class="bi bi-link-45deg me-1"></i>Owner Link</button>
                    </div>

                    <div class="section-title">External Signing</div>
                    <div class="card-insign">
                        <div class="card-body p-2">
                            <div class="mb-1">
                                <input type="email" class="form-control form-control-sm" id="email1" placeholder="Email Signer 1">
                            </div>
                            <div class="mb-1">
                                <input type="email" class="form-control form-control-sm" id="email2" placeholder="Email Signer 2">
                            </div>
                            <div class="mb-1">
                                <select class="form-select form-select-sm" id="delivery" onchange="togglePhoneFields()">
                                    <option value="link">Link only</option>
                                    <option value="email">Email</option>
                                    <option value="sms">SMS</option>
                                </select>
                            </div>
                            <div id="phone-fields" style="display:none">
                                <input type="tel" class="form-control form-control-sm mb-1" id="phone1" placeholder="Phone Signer 1">
                                <input type="tel" class="form-control form-control-sm mb-1" id="phone2" placeholder="Phone Signer 2">
                            </div>
                            <button class="btn btn-insign btn-insign-sm btn-insign-primary w-100" onclick="inviteExtern()">
                                <i class="bi bi-send me-1"></i>Send Invitations</button>
                        </div>
                    </div>
                    <div class="d-flex flex-wrap gap-1">
                        <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="apiGet('/api/extern/users', 'Extern Users')">
                            <i class="bi bi-people me-1"></i>Extern Users</button>
                        <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="apiGet('/api/extern/infos', 'Extern Infos')">
                            <i class="bi bi-info-square me-1"></i>Extern Infos</button>
                        <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="apiPost('/api/extern/revoke', null, 'Revoke Invites')">
                            <i class="bi bi-x-circle me-1"></i>Revoke</button>
                        <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="apiPost('/api/extern/reminder', null, 'Reminder')">
                            <i class="bi bi-bell me-1"></i>Reminder</button>
                    </div>

                    <div class="section-title">Documents &amp; Audit</div>
                    <div class="d-flex flex-wrap gap-1">
                        <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="download('/api/documents/download')">
                            <i class="bi bi-download me-1"></i>Download ZIP</button>
                        <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="download('/api/audit/download')">
                            <i class="bi bi-file-pdf me-1"></i>Audit PDF</button>
                        <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="apiGet('/api/audit/json', 'Audit JSON')">
                            <i class="bi bi-journal-text me-1"></i>Audit JSON</button>
                    </div>

                    <div class="section-title">User Sessions</div>
                    <div class="d-flex flex-wrap gap-1">
                        <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="apiGet('/api/sessions/user', 'User Sessions')">
                            <i class="bi bi-collection me-1"></i>My Sessions</button>
                        <button class="btn btn-insign btn-insign-sm btn-insign-outline" onclick="queryCurrentSession()">
                            <i class="bi bi-search me-1"></i>Query Session</button>
                    </div>

                    <div class="section-title mt-3">Danger Zone</div>
                    <button class="btn btn-insign btn-insign-sm btn-insign-danger" onclick="purgeSession()">
                        <i class="bi bi-trash me-1"></i>Purge Session</button>
                </div>
            </div>

            <!-- Right column: Response history -->
            <div class="col-md-8 col-lg-9">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="section-title mt-0 mb-0">Responses</span>
                    <button class="btn btn-insign btn-insign-sm btn-insign-outline py-0" onclick="document.getElementById('response-list').innerHTML=''">Clear All</button>
                </div>
                <div id="response-list"></div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="d-flex flex-wrap">
            <div class="status-section flex-fill">
                <span class="label">Session:</span>
                <span id="sb-session">-</span>
                <span class="ms-2 label">User:</span>
                <span id="sb-userid">-</span>
                <span class="ms-2 label">TAN:</span>
                <span id="sb-tan" style="color:var(--insign-blue)">-</span>
                <span class="ms-2 label">Completed:</span>
                <span id="sb-completed" class="badge-incomplete">-</span>
                <span class="ms-2" id="sb-poll-indicator"></span>
            </div>
        </div>
        <div class="d-flex flex-wrap">
            <div class="status-section flex-fill">
                <span class="label">Signatures:</span>
                <span id="sb-sig-summary">-</span>
                <span class="ms-2 label">Mandatory:</span>
                <span id="sb-mandatory">-</span>
                <span class="ms-2 label">Optional:</span>
                <span id="sb-optional">-</span>
            </div>
        </div>
        <div class="d-flex flex-wrap">
            <div class="status-section flex-fill">
                <span class="label">Signature Fields:</span>
                <span id="sb-fields"></span>
            </div>
        </div>
        <div class="d-flex flex-wrap">
            <div class="status-section flex-fill">
                <span class="label">Step:</span>
                <span id="sb-process-step" style="color:var(--insign-blue)">-</span>
                <span class="ms-2 label">Needed:</span>
                <span id="sb-sigs-needed">-</span>
                <span class="ms-2 label">Done:</span>
                <span id="sb-sigs-done">-</span>
                <span class="ms-2 label">Extern:</span>
                <span id="sb-extern">-</span>
            </div>
        </div>
        <!-- Webhook events row -->
        <div class="d-flex flex-wrap" id="sb-webhook-row" style="display:none !important">
            <div class="status-section flex-fill">
                <span class="label"><i class="bi bi-broadcast"></i> Webhooks:</span>
                <span id="sb-webhooks"></span>
            </div>
        </div>
    </div>

    <template id="tpl-response-card">
        <div class="response-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span data-slot="title"></span>
                <span class="timestamp" data-slot="time"></span>
            </div>
            <div class="card-body"></div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    var sessionActive = false;
    var currentSessionId = null;
    var pollTimer = null;
    var evtSource = null;
    var webhookEvents = [];
    var MAX_WEBHOOK_EVENTS = 10;

    function timeStr() {
        return new Date().toLocaleTimeString();
    }

    // -- Init --
    $(function() {
        $.get('/api/version').done(function(d) {
            $('#version-badge').text('v' + d.version);
        });
        connectSSE();
    });

    // -- SSE --
    function connectSSE() {
        if (evtSource) evtSource.close();
        evtSource = new EventSource('/api/events');
        evtSource.addEventListener('status-change', function(e) {
            var data = JSON.parse(e.data);
            updateStatusBar(data.status);
        });
        evtSource.addEventListener('webhook', function(e) {
            var data = JSON.parse(e.data);
            addWebhookEvent(data);
            updateStatusBar(data.status);
        });
        evtSource.onerror = function() {
            // EventSource auto-reconnects; no need to show repeated errors
        };
    }

    function addWebhookEvent(data) {
        var eventId = (data.event && data.event.eventid) || 'UNKNOWN';
        webhookEvents.unshift({ eventId: eventId, time: timeStr(), data: data });
        if (webhookEvents.length > MAX_WEBHOOK_EVENTS) webhookEvents.pop();

        // Show webhook row in status bar
        $('#sb-webhook-row').css('display', '').removeClass('d-none');

        // Render events
        var html = '';
        for (var i = 0; i < webhookEvents.length; i++) {
            var evt = webhookEvents[i];
            html += '<span class="webhook-event">'
                + '<span class="event-id">' + evt.eventId + '</span> '
                + '<span class="event-time">' + evt.time + '</span>'
                + '</span> ';
        }
        $('#sb-webhooks').html(html);

        // Also add a response card for the webhook
        addResponseCard('Webhook: ' + eventId, data, false);
    }

    // -- Polling --
    function startPolling() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(pollStatus, 5000);
        pollStatus();
    }

    var backendDown = false;

    function pollStatus() {
        if (!sessionActive) return;
        $('#sb-poll-indicator').html('<i class="bi bi-arrow-repeat spin"></i>');
        $.get('/api/session/status').done(function(d) {
            if (backendDown) {
                backendDown = false;
                showAlert('Backend reconnected', 'success');
                $('#sb-poll-indicator').text('');
            }
            updateStatusBar(d);
        }).fail(function(xhr) {
            if (!backendDown && xhr.status === 0) {
                backendDown = true;
                showAlert('Backend not reachable - polling paused until reconnected', 'warning');
            }
            $('#sb-poll-indicator').html(backendDown ? '<i class="bi bi-exclamation-triangle text-warning"></i> offline' : '');
        });
        $.get('/api/session/checkstatus').done(function(d) {
            updateCheckStatus(d);
            $('#sb-poll-indicator').text('');
        }).fail(function() {
            // already handled above
        });
    }

    function updateStatusBar(status) {
        // Only update fields that are present in the response.
        // SSE events from the backend poller use checkStatus data which lacks
        // session detail fields - skip those to avoid blanking the status bar.

        // Session info
        if (status.sessionid || status.sessionId) {
            var sid = status.sessionid || status.sessionId;
            $('#sb-session').text(sid.length > 14 ? sid.substring(0, 14) + '...' : sid);
        }
        if ('userid' in status) $('#sb-userid').text(status.userid || '-');
        if ('tan' in status) $('#sb-tan').text(status.tan || '-');

        // Completed flag
        if ('sucessfullyCompleted' in status) {
            var completed = status.sucessfullyCompleted || false;
            $('#sb-completed').text(completed ? 'YES' : 'NO')
                .removeClass('badge-completed badge-incomplete')
                .addClass(completed ? 'badge-completed' : 'badge-incomplete');
        }

        // Signature counts - only update if present
        if ('numberOfSignaturesFields' in status) {
            var totalSigFields = status.numberOfSignaturesFields || 0;
            var mandatoryFields = status.numberOfMandatorySignatureFields || 0;
            var mandatorySigs = status.numberOfMandatorySignatures || 0;
            var optionalFields = status.numberOfOptionalSignatureFields || 0;
            var optionalSigs = status.numberOfOptionalSignatures || 0;

            $('#sb-sig-summary').text('- / ' + totalSigFields + ' signed');
            $('#sb-mandatory').text(mandatorySigs + ' sigs / ' + mandatoryFields + ' fields');
            $('#sb-optional').text(optionalSigs + ' sigs / ' + optionalFields + ' fields');
        }

        // Signature fields detail
        if ('signaturFieldsStatusList' in status) {
            var sigFields = status.signaturFieldsStatusList || [];
            var signedCount = 0;
            var fieldHtml = '';
            for (var i = 0; i < sigFields.length; i++) {
                var f = sigFields[i];
                var signed = f.signed || false;
                if (signed) signedCount++;
                var icon = signed
                    ? '<i class="bi bi-check-circle-fill text-success"></i>'
                    : (f.mandatory ? '<i class="bi bi-circle text-danger"></i>' : '<i class="bi bi-circle text-warning"></i>');
                var mLabel = f.mandatory ? '<span class="text-danger">*</span>' : '';
                fieldHtml += icon + ' ' + (f.displayname || f.name || '?') + mLabel
                    + ' <small class="text-muted">(' + (f.role || '?') + ')</small> ';
            }
            var totalSigFields2 = status.numberOfSignaturesFields || sigFields.length;
            $('#sb-sig-summary').text(signedCount + ' / ' + totalSigFields2 + ' signed');
            $('#sb-fields').html(fieldHtml || '-');
        }

        // checkStatus fields (may arrive via SSE from backend poller)
        if ('processStep' in status) updateCheckStatus(status);
    }

    function updateCheckStatus(status) {
        $('#sb-process-step').text(status.processStep || '-');
        var needed = status.numberOfSignaturesNeeded;
        var done = status.numberOfSignaturesNeededDone;
        $('#sb-sigs-needed').text(needed != null ? needed : '-');
        $('#sb-sigs-done').text(done != null ? (done + (needed != null ? ' / ' + needed : '')) : '-');
        var ext = status.extern;
        $('#sb-extern').html(ext ? '<span class="badge-signed">YES</span>' : '<span class="badge-unsigned">NO</span>');
    }

    // -- Response card management --
    function addResponseCard(title, data, isError, requestData) {
        var json = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
        var errorClass = isError ? ' border-danger' : '';
        var textClass = isError ? ' text-danger' : '';

        var tpl = document.getElementById('tpl-response-card');
        var card = tpl.content.cloneNode(true).firstElementChild;
        if (errorClass) card.classList.add('border-danger');
        card.querySelector('[data-slot="title"]').textContent = title;
        card.querySelector('[data-slot="time"]').textContent = timeStr();

        var body = card.querySelector('.card-body');

        // Show request JSON if provided
        if (requestData) {
            var reqLabel = document.createElement('div');
            reqLabel.className = 'response-label';
            reqLabel.textContent = 'Request';
            body.appendChild(reqLabel);

            var reqPre = document.createElement('pre');
            reqPre.className = 'mb-2';
            reqPre.textContent = typeof requestData === 'string' ? requestData : JSON.stringify(requestData, null, 2);
            body.appendChild(reqPre);

            var respLabel = document.createElement('div');
            respLabel.className = 'response-label';
            respLabel.textContent = 'Response';
            body.appendChild(respLabel);
        }

        var respPre = document.createElement('pre');
        if (textClass) respPre.className = textClass;
        respPre.textContent = json;
        body.appendChild(respPre);

        document.getElementById('response-list').prepend(card);
    }

    // -- API helpers --
    function formatErrorDetail(body) {
        var msg = body.message || 'Unknown error';
        if (body.httpStatus) {
            msg = 'HTTP ' + body.httpStatus + ' - ' + msg;
        }
        var detail = msg;
        if (body.responseBody) {
            try {
                detail = msg + '\n\nServer response:\n' + JSON.stringify(JSON.parse(body.responseBody), null, 2);
            } catch(e) {
                detail = msg + '\n\nServer response:\n' + body.responseBody;
            }
        }
        return { msg: msg, detail: detail };
    }

    function apiGet(url, title) {
        $.get(url).done(function(data) {
            if (data && data.error) {
                var err = formatErrorDetail(data);
                addResponseCard(title || url, err.detail, true);
                showAlert(err.msg, 'danger');
                return;
            }
            addResponseCard(title || url, data, false);
        }).fail(function(xhr) { handleError(xhr, title || url); });
    }

    function apiPost(url, data, title) {
        $.ajax({ url: url, method: 'POST', contentType: 'application/json',
                 data: data ? JSON.stringify(data) : null
        }).done(function(resp) {
            if (resp && resp.error) {
                var err = formatErrorDetail(resp);
                addResponseCard(title || url, err.detail, true);
                showAlert(err.msg, 'danger');
                return;
            }
            addResponseCard(title || url, resp, false);
        }).fail(function(xhr) { handleError(xhr, title || url); });
    }

    function handleError(xhr, title) {
        if (xhr.status === 0) {
            addResponseCard(title, 'Connection failed - is the server running on port 8090?', true);
            showAlert('Connection failed', 'danger');
            return;
        }
        var msg = 'HTTP ' + xhr.status + ' ' + (xhr.statusText || 'Error');
        var detail = msg;
        if (xhr.responseText) {
            try {
                var body = JSON.parse(xhr.responseText);
                var err = formatErrorDetail(body);
                msg = err.msg;
                detail = err.detail;
            } catch(e) {
                detail = msg + '\n\n' + xhr.responseText;
            }
        }
        addResponseCard(title, detail, true);
        showAlert(msg, 'danger');
    }

    function showAlert(message, type) {
        var id = 'alert-' + Date.now();
        var $alert = $('<div class="alert alert-dismissible alert-toast fade show"></div>')
            .addClass('alert-' + type)
            .attr('id', id)
            .text(message)
            .append('<button type="button" class="btn-close" data-bs-dismiss="alert"></button>');
        $('#alert-area').append($alert);
        setTimeout(function() { $('#' + id).alert('close'); }, 5000);
    }

    // -- Actions --
    function createSession() {
        $('#btn-create').prop('disabled', true).html('<i class="bi bi-hourglass-split"></i> Creating...');
        $.post('/api/session/create').done(function(data) {
            var request = data.request || null;
            var response = data.response || data;
            sessionActive = true;
            currentSessionId = response.sessionid || null;
            addResponseCard('Create Session', response, false, request);
            $('#session-actions').slideDown();
            $('#btn-create').html('<i class="bi bi-plus-circle me-1"></i> Create New Session');
            showAlert('Session created: ' + (response.sessionid || ''), 'success');
            startPolling();
        }).fail(function(xhr) {
            handleError(xhr, 'Create Session');
        }).always(function() {
            $('#btn-create').prop('disabled', false);
        });
    }

    function inviteExtern() {
        var data = {
            email1: $('#email1').val(),
            email2: $('#email2').val(),
            delivery: $('#delivery').val(),
            phone1: $('#phone1').val(),
            phone2: $('#phone2').val()
        };
        $.ajax({ url: '/api/extern/invite', method: 'POST', contentType: 'application/json',
                 data: JSON.stringify(data)
        }).done(function(resp) {
            var request = resp.request || null;
            var response = resp.response || resp;
            if (response && response.error) {
                addResponseCard('Invite Extern', response.message || 'Unknown error', true);
                return;
            }
            addResponseCard('Invite Extern', response, false, request);
        }).fail(function(xhr) { handleError(xhr, 'Invite Extern'); });
    }

    function getOwnerLink() {
        $.get('/api/owner-link').done(function(data) {
            addResponseCard('Owner Link', data, false);
            if (data.url) {
                window.open(data.url, '_blank');
            }
        }).fail(function(xhr) { handleError(xhr, 'Owner Link'); });
    }

    function download(url) {
        window.location.href = url;
    }

    function purgeSession() {
        $.ajax({ url: '/api/session/purge', method: 'DELETE' }).done(function(data) {
            sessionActive = false;
            currentSessionId = null;
            addResponseCard('Purge Session', data, false);
            $('#session-actions').slideUp();
            $('#sb-session').text('-');
            $('#sb-completed').text('-').removeClass('badge-completed badge-incomplete');
            $('#sb-sig-summary').text('-');
            $('#sb-fields').text('-');
            if (pollTimer) clearInterval(pollTimer);
            showAlert('Session purged', 'warning');
        }).fail(function(xhr) { handleError(xhr, 'Purge Session'); });
    }

    function queryCurrentSession() {
        if (!currentSessionId) {
            showAlert('No active session', 'warning');
            return;
        }
        apiPost('/api/sessions/query', { sessionids: [currentSessionId] }, 'Query Session');
    }

    function togglePhoneFields() {
        $('#phone-fields').toggle($('#delivery').val() === 'sms');
    }
    </script>
</body>
</html>
